<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Namirnice" />
  <title>Namirnice</title>
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #1a1a1a;
      --ink-light: #888;
      --accent: #2d6a4f;
      --danger: #c1440e;
      --border: #e8e2d9;
      --checked-bg: #f0f0ec;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 52px 24px 20px;
      position: sticky; top: 0; z-index: 10;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem; letter-spacing: -0.5px; color: var(--ink);
    }
    header h1 span { font-style: italic; color: var(--accent); }

    .sync-bar {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; font-size: 0.75rem;
      color: var(--ink-light); font-weight: 300;
    }

    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink-light); transition: background 0.3s; flex-shrink: 0;
    }
    .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
    .sync-dot.ok      { background: var(--accent); }
    .sync-dot.error   { background: var(--danger); }
    .sync-dot.dirty   { background: #f0a500; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .gear-btn {
      position: absolute; top: 52px; right: 24px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 4px;
    }
    .share-btn {
      position: absolute; top: 52px; right: 56px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 4px;
    }
    .clear-header-btn {
      position: absolute; top: 52px; right: 92px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 4px;
    }

    .add-bar {
      display: flex; gap: 10px; padding: 12px 12px;
      background: var(--card); border-bottom: 1px solid var(--border);
      position: sticky; top: 101px; z-index: 9;
    }

    .add-bar input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
      background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.2s;
    }
    .add-bar input:focus { border-color: var(--accent); }
    .add-bar input::placeholder { color: var(--ink-light); }

    .add-bar button {
      background: transparent; color: var(--accent); border: none; border-radius: 10px;
      width: 48px; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .add-bar button:active { opacity: 0.8; transform: scale(0.95); }

    .filter-btn {
      background: transparent; border: none; border-radius: 10px;
      width: 48px; height: 48px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: opacity 0.2s;
    }
    .filter-btn.active { opacity: 1; }

    .list-wrap { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

    .section-label {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--ink-light); margin-top: 8px; margin-bottom: 2px;
    }

    /* Swipe row */
    .item-wrap {
      position: relative; border-radius: 12px;
      overflow: hidden; animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-delete-bg {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 90px;
      background: var(--danger);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.85rem; font-weight: 500;
      gap: 5px; border-radius: 12px;
      cursor: pointer;
    }

    .item {
      position: relative; background: var(--card); border-radius: 12px;
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: background 0.2s; touch-action: pan-y;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; will-change: transform;
    }

    .item.checked { background: var(--checked-bg); border-color: transparent; box-shadow: none; }
    .item.checked .item-name { color: var(--ink-light); }

    .check-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border); background: white;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .item.checked .check-btn { background: var(--accent); border-color: var(--accent); }
    .item.checked .item-name { color: var(--ink); }
    .item:not(.checked) .check-btn { background: white; border-color: var(--border); }
    .item:not(.checked) .item-name { color: var(--ink-light); }
    .item-name { flex: 1; font-size: 1.3rem; font-weight: 400; transition: color 0.2s; }

    .empty { text-align: center; padding: 60px 24px; color: var(--ink-light); }
    .empty p:first-child {
      font-family: 'DM Serif Display', serif; font-size: 1.3rem;
      font-style: italic; margin-bottom: 6px; color: var(--ink);
    }
    .empty p:last-child { font-size: 0.85rem; font-weight: 300; }

    .clear-btn {
      display: block; margin: 8px auto 24px; background: none;
      border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 18px;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--ink-light); cursor: pointer;
    }
    .clear-btn:active { border-color: var(--danger); color: var(--danger); }

    /* Config sheet */
    .config-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end;
    }
    .config-overlay.open { display: flex; }

    .config-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp 0.25s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .config-sheet h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 4px; }
    .config-sheet > p { font-size: 0.8rem; color: var(--ink-light); margin-bottom: 20px; font-weight: 300; }
    .config-sheet label {
      display: block; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px;
    }
    .config-sheet input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-family: monospace; font-size: 0.85rem;
      background: var(--bg); color: var(--ink); outline: none; margin-bottom: 16px;
    }
    .config-sheet input:focus { border-color: var(--accent); }
    .config-actions {
      display: flex; gap: 10px;
    }
    .config-save {
      flex: 1; background: var(--accent); color: white; border: none;
      border-radius: 12px; padding: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer;
    }
    .config-cancel {
      flex: 1; background: none; border: 1.5px solid var(--border); color: var(--ink-light);
      border-radius: 12px; padding: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 0.85rem; transition: transform 0.3s ease;
      z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    mark { background: #fff0a0; color: var(--ink); border-radius: 2px; padding: 0 1px; }

    /* Category icon on item */
    .cat-icon {
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .cat-icon:active { opacity: 1; }

    /* Category picker overlay */
    .cat-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end;
    }
    .cat-overlay.open { display: flex; }
    .cat-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp 0.22s ease;
    }
    .cat-sheet h3 {
      font-family: 'DM Serif Display', serif; font-size: 1.2rem;
      margin-bottom: 16px; color: var(--ink);
    }
    .cat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .cat-option {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.15s;
    }
    .cat-option.selected { border-color: var(--accent); background: #d8f3dc; }
    .cat-option span:first-child { font-size: 1.8rem; }
    .cat-option span:last-child { font-size: 0.8rem; color: var(--ink-light); text-align: center; }
    .cat-close {
      width: 100%; background: none; border: none; color: var(--ink-light);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; padding: 8px;
    }

    /* Quantity badge on item row */
    .qty-badge {
      font-size: 0.8rem; color: var(--accent); font-weight: 600;
      background: var(--bg); border: 1.5px solid var(--accent);
      border-radius: 6px; padding: 2px 8px; flex-shrink: 0;
    }

    /* Inline quantity editor */
    .qty-inline {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 14px;
      margin: -2px 4px 0; animation: slideIn 0.15s ease;
    }
    .qty-stepper-row {
      display: flex; align-items: center; gap: 6px; flex: 1;
    }
    .qty-stepper-row.hidden { display: none; }
    .qty-step-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: 1.1rem; cursor: pointer; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.1s;
    }
    .qty-step-btn:active { background: var(--border); }
    .qty-num-btn {
      min-width: 44px; height: 34px; padding: 0 10px;
      border: 1.5px solid var(--accent); border-radius: 8px;
      background: white; font-size: 1rem; font-weight: 500;
      color: var(--accent); cursor: pointer;
    }
    .qty-text-row {
      display: none; flex: 1; align-items: center; gap: 6px;
    }
    .qty-text-row.visible { display: flex; }
    .qty-text-input {
      flex: 1; border: 1.5px solid var(--accent); border-radius: 8px;
      padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      background: var(--bg); color: var(--ink); outline: none;
    }
    .qty-back-btn {
      background: none; border: none; color: var(--ink-light); font-size: 0.75rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0; flex-shrink: 0;
    }
    .qty-confirm-btn, .qty-dismiss-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      cursor: pointer; font-size: 0.9rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-confirm-btn { background: var(--accent); color: white; }
    .qty-dismiss-btn { background: var(--bg); color: var(--ink-light); border: 1.5px solid var(--border); }

    .cat-icon-editor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .cat-icon-edit-cell { cursor: pointer; }
    .cat-icon-edit-cell .cat-icon-display { font-size: 1.8rem; }
    .cat-icon-edit-cell.editing .cat-icon-display { display: none; }
    .cat-icon-inp {
      display: none; width: 2.4rem; height: 2.4rem; text-align: center; font-size: 1.4rem;
      border: 1.5px solid var(--accent); border-radius: 8px;
      background: white; outline: none; padding: 0; caret-color: transparent;
    }
    .cat-icon-edit-cell.editing .cat-icon-inp { display: block; }

    .sort-options {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;
    }
    .sort-option {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--ink-light);
      text-align: left;
    }
    .sort-option::before {
      content: ''; flex-shrink: 0;
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); background: white; transition: all 0.15s;
    }
    .sort-option.selected { border-color: var(--accent); color: var(--ink); }
    .sort-option.selected::before { border-color: var(--accent); background: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Nije konfigurirano</span>
  </div>
  <button class="gear-btn" onclick="openConfig()" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <button class="share-btn" onclick="shareList()" aria-label="Share">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </button>
  <button class="clear-header-btn" onclick="clearToBuy()" aria-label="Clear to buy">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  </button>
</header>

<div class="add-bar">
  <input type="text" id="newItem" placeholder="Dodaj / pretraži artikl…" autocomplete="off" autocorrect="off" />
  <button class="filter-btn" id="filterBtn" onclick="openCatFilter()" aria-label="Filtriraj po kategoriji">
    <span style="font-size:1.2rem">🛒</span>
  </button>
  <button onclick="addItem()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>
<div class="list-wrap" id="listWrap"></div>
<div class="toast" id="toast"></div>

<!-- Category filter picker -->
<div class="cat-overlay" id="catFilterOverlay">
  <div class="cat-sheet">
    <h3>Filtriraj po kategoriji</h3>
    <div class="cat-grid" id="catFilterGrid"></div>
    <button class="cat-close" onclick="closeCatFilter()">Gotovo</button>
  </div>
</div>

<!-- Category picker -->
<div class="cat-overlay" id="catOverlay">
  <div class="cat-sheet">
    <h3>Promijeni kategoriju</h3>
    <div class="cat-grid" id="catGrid"></div>
    <button class="cat-close" onclick="closeCatPicker()">Odustani</button>
  </div>
</div>

<!-- Config -->
<div class="config-overlay" id="configOverlay">
  <div class="config-sheet">
    <h2>Postavke</h2>
    <label>GitHub osobni token</label>
    <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
    <label>Sortiranje</label>
    <div class="sort-options">
      <button class="sort-option" id="sortOptCategory" onclick="setSortType('category')">Kategorija → Za kupiti → Abeceda</button>
      <button class="sort-option" id="sortOptTobuy" onclick="setSortType('tobuy')">Za kupiti → Kategorija → Abeceda</button>
    </div>
    <label>Ikone kategorija</label>
    <div id="catIconEditor" class="cat-icon-editor"></div>
    <div class="config-actions">
      <button class="config-cancel" onclick="closeConfig()">Odustani</button>
      <button class="config-save" onclick="saveConfig()">Spremi</button>
    </div>
  </div>
</div>

<script>
  // ── Config ───────────────────────────────────────────────
  let cfg = {
    user:  'okinkela',
    repo:  'groceries',
    token: localStorage.getItem('gh_token') || ''
  };

  let items   = [];
  let fileSha = '';
  let dirty   = false;
  let pushing = false;
  let filter  = '';
  let newItemCategory = 'other';
  let filterCategory = null; // null = all
  let sortType = localStorage.getItem('sort_type') || 'category';

  const CATEGORIES = [
    { id: 'produce',    icon: '🍋', label: 'Voće' },
    { id: 'vegetables', icon: '🥕', label: 'Povrće' },
    { id: 'meat',       icon: '🥩', label: 'Meso' },
    { id: 'dairy',      icon: '🐄', label: 'Mliječni' },
    { id: 'bakery',     icon: '🥖', label: 'Pekara' },
    { id: 'pantry',     icon: '🥫', label: 'Ostava' },
    { id: 'drinks',     icon: '🍷', label: 'Pića' },
    { id: 'frozen',     icon: '❄️', label: 'Smrznuto' },
    { id: 'care',       icon: '🪥', label: 'Higijena' },
    { id: 'household',  icon: '🧹', label: 'Kućanstvo' },
    { id: 'fish',       icon: '🐟', label: 'Riba' },
    { id: 'pharmacy',   icon: '💊', label: 'Ljekarna' },
    { id: 'other',      icon: '❓', label: 'Ostalo' },
  ];

  const _defaultIcons  = Object.fromEntries(CATEGORIES.map(c => [c.id, c.icon]));
  let sharedCatIcons   = {};
  let localCatIcons    = JSON.parse(localStorage.getItem('cat_icons') || '{}');

  function applyCatIcons() {
    CATEGORIES.forEach(c => {
      c.icon = localCatIcons[c.id] ?? sharedCatIcons[c.id] ?? _defaultIcons[c.id];
    });
  }
  applyCatIcons();

  function catById(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1]; }

  // ── Local persistence ────────────────────────────────────
  function saveLocal() {
    localStorage.setItem('items_cache', JSON.stringify(items));
    localStorage.setItem('items_sha',   fileSha);
    if (Object.keys(sharedCatIcons).length)
      localStorage.setItem('shared_cat_icons', JSON.stringify(sharedCatIcons));
  }

  function loadLocal() {
    const cached = localStorage.getItem('items_cache');
    const sha    = localStorage.getItem('items_sha');
    if (cached) { items = JSON.parse(cached); fileSha = sha || ''; }
    const sc = localStorage.getItem('shared_cat_icons');
    if (sc) sharedCatIcons = JSON.parse(sc);
    applyCatIcons();
  }

  // ── Sync status ──────────────────────────────────────────
  function setSync(state, msg) {
    document.getElementById('syncDot').className = 'sync-dot ' + state;
    document.getElementById('syncLabel').textContent = msg;
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── GitHub API ────────────────────────────────────────────
  function apiUrl() {
    return `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/groceries.json`;
  }

  async function fetchList() {
    if (!cfg.user || !cfg.token) { openConfig(); return; }
    if (dirty) return; // don't overwrite unsaved local changes
    setSync('syncing', 'Sinkronizacija…');
    try {
      const res = await fetch(apiUrl(), {
        headers: { Authorization: `token ${cfg.token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      fileSha = data.sha;
      const raw = JSON.parse(atob(data.content.replace(/\n/g, '')));
      if (Array.isArray(raw)) { items = raw; }
      else { items = raw.items || []; sharedCatIcons = raw.categoryIcons || {}; }
      applyCatIcons();
      saveLocal();
      render();
      setSync('ok', 'Sinkronizirano');
    } catch {
      setSync('error', 'Greška — pokušavam ponovo');
    }
  }

  async function pushList() {
    if (!cfg.user || !cfg.token || pushing) return;
    pushing = true;
    setSync('syncing', 'Spremanje…');
    try {
      const res = await fetch(apiUrl(), {
        method: 'PUT',
        headers: {
          Authorization: `token ${cfg.token}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'update groceries',
          content: btoa(unescape(encodeURIComponent(JSON.stringify({ items, categoryIcons: sharedCatIcons })))),
          sha: fileSha
        })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      fileSha = data.content.sha;
      saveLocal();
      dirty = false;
      setSync('ok', 'Spremljeno');
    } catch {
      setSync('dirty', 'Nije spremljeno — pokušavam ponovo');
    } finally {
      pushing = false;
    }
  }

  function markDirty() {
    dirty = true;
    saveLocal();
    setSync('dirty', 'Čeka spremanje…');
  }

  // Every 30s: push if dirty, fetch if clean
  setInterval(() => { dirty ? pushList() : fetchList(); }, 30000);

  // ── Render ────────────────────────────────────────────────
  function render(scrollToId) {
    closeQtyPicker();
    const wrap = document.getElementById('listWrap');
    const q = filter.toLowerCase().trim();
    let visible = items;
    if (filterCategory) visible = visible.filter(i => i.category === filterCategory);
    if (q) visible = visible.filter(i => i.name.toLowerCase().includes(q));

    wrap.innerHTML = '';

    if (visible.length === 0) {
      wrap.innerHTML = (q || filterCategory)
        ? `<div class="empty"><p>Nema rezultata</p><p>Tapni + za dodati "${escHtml(filter)}"</p></div>`
        : `<div class="empty"><p>Još ništa</p><p>Dodaj prvi artikl gore</p></div>`;
      return;
    }

    const catOrder = Object.fromEntries(CATEGORIES.map((c, i) => [c.id, i]));
    const alpha = (a, b) => a.name.localeCompare(b.name, 'hr');
    const byCat = (a, b) => (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
    const hl = q || null;

    if (sortType === 'tobuy') {
      const toBuy    = visible.filter(i =>  i.checked).sort((a, b) => byCat(a, b) || alpha(a, b));
      const inactive = visible.filter(i => !i.checked).sort((a, b) => byCat(a, b) || alpha(a, b));
      if (toBuy.length > 0) {
        wrap.appendChild(sectionLabel('Za kupiti'));
        toBuy.forEach(item => wrap.appendChild(makeItemEl(item, hl)));
      }
      inactive.forEach(item => wrap.appendChild(makeItemEl(item, hl)));
    } else {
      CATEGORIES.forEach(cat => {
        const catItems = visible.filter(i => i.category === cat.id);
        if (catItems.length === 0) return;
        const toBuy    = catItems.filter(i =>  i.checked).sort(alpha);
        const inactive = catItems.filter(i => !i.checked).sort(alpha);
        if (!filterCategory) wrap.appendChild(sectionLabel(`${cat.icon} ${cat.label}`));
        [...toBuy, ...inactive].forEach(item => wrap.appendChild(makeItemEl(item, hl)));
      });
    }

    if (scrollToId) {
      setTimeout(() => {
        const el = document.getElementById('wrap-' + scrollToId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }
  }

  function sectionLabel(text) {
    const d = document.createElement('div');
    d.className = 'section-label';
    d.textContent = text;
    return d;
  }

  function makeItemEl(item, highlight) {
    const wrap = document.createElement('div');
    wrap.className = 'item-wrap';
    wrap.id = 'wrap-' + item.id;

    // Red background shown during swipe
    const bg = document.createElement('div');
    bg.className = 'item-delete-bg';
    bg.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
      Ukloni`;
    wrap.appendChild(bg);

    // Item row
    const el = document.createElement('div');
    el.className = 'item' + (item.checked ? ' checked' : '');
    const displayName = highlight ? highlightMatch(item.name, highlight) : escHtml(item.name);
    const cat = catById(item.category);
    const qtyHtml = (item.checked && item.qty != null && item.qty !== '')
      ? `<span class="qty-badge">${typeof item.qty === 'number' ? '× ' + item.qty : escHtml(String(item.qty))}</span>`
      : '';
    el.innerHTML = `
      <button class="check-btn" onclick="toggle('${item.id}')"></button>
      <span class="item-name">${displayName}</span>
      ${qtyHtml}
      <span class="cat-icon" onclick="openCatPicker('${item.id}')" title="${cat.label}">${cat.icon}</span>
    `;

    // Long press (touch) or right-click (desktop) to open quantity picker
    let lpTimer = null;
    el.addEventListener('touchstart', () => {
      lpTimer = setTimeout(() => { lpTimer = null; openQtyPicker(item.id); }, 500);
    }, { passive: true });
    el.addEventListener('touchmove',  () => { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
    el.addEventListener('touchend',   () => { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
    el.addEventListener('contextmenu', e => { e.preventDefault(); openQtyPicker(item.id); });

    wrap.appendChild(el);
    attachSwipe(el, item);
    return wrap;
  }

  // ── Swipe left to delete ──────────────────────────────────
  function attachSwipe(el, item) {
    let startX = 0, curX = 0, active = false, revealed = false;
    const REVEAL = 90;

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      curX = 0; active = true;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!active) return;
      const dx = e.touches[0].clientX - startX;
      if (revealed) {
        const newX = -REVEAL + dx;
        const clamped = Math.min(0, Math.max(newX, -REVEAL));
        el.style.marginRight = Math.abs(clamped) + 'px';
        curX = clamped;
      } else {
        if (dx > 0) return;
        curX = dx;
        el.style.marginRight = Math.min(Math.abs(dx), REVEAL) + 'px';
      }
    }, { passive: true });

    el.addEventListener('touchend', () => {
      if (!active) return;
      active = false;
      el.style.transition = 'margin-right 0.2s ease';
      if (revealed) {
        if (curX > -REVEAL / 2) {
          el.style.marginRight = '0px';
          revealed = false;
        } else {
          el.style.marginRight = REVEAL + 'px';
        }
      } else {
        if (curX < -REVEAL / 2) {
          el.style.marginRight = REVEAL + 'px';
          revealed = true;
        } else {
          el.style.marginRight = '0px';
        }
      }
    });

    // Tap red bg to delete
    const wrap = el.parentElement;
    wrap.querySelector('.item-delete-bg').addEventListener('click', () => {
      items = items.filter(i => i.id !== item.id);
      markDirty(); render();
    });
  }

  // ── Actions ───────────────────────────────────────────────
  function addItem() {
    const input = document.getElementById('newItem');
    const name  = input.value.trim();
    if (!name) return;
    const id = Date.now().toString();
    items.unshift({ id, name, checked: true, category: newItemCategory });
    input.value = '';
    filter = '';
    newItemCategory = 'other';
    markDirty();
    render(id);
  }

  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    // FLIP: record positions before change
    const wrap = document.getElementById('listWrap');
    const before = {};
    wrap.querySelectorAll('.item-wrap[id]').forEach(el => {
      before[el.id] = el.getBoundingClientRect().top;
    });

    // Flash the button green/grey before sort
    const itemEl = document.querySelector(`#wrap-${id} .item`);
    if (itemEl) {
      itemEl.style.transition = 'background 0.15s';
      itemEl.style.background = '#d8f3dc';
      setTimeout(() => { itemEl.style.background = ''; }, 200);
    }

    // Apply change after brief flash
    setTimeout(() => {
      item.checked = !item.checked;
      markDirty();
      render();

      // FLIP: animate from old positions to new
      requestAnimationFrame(() => {
        wrap.querySelectorAll('.item-wrap[id]').forEach(el => {
          if (before[el.id] === undefined) return;
          const after = el.getBoundingClientRect().top;
          const delta = before[el.id] - after;
          if (Math.abs(delta) < 2) return;
          el.style.transition = 'none';
          el.style.transform = `translateY(${delta}px)`;
          requestAnimationFrame(() => {
            el.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)';
            el.style.transform = 'translateY(0)';
          });
        });
      });
    }, 200);
  }

  function clearChecked() {
    items = items.filter(i => !i.checked);
    markDirty(); render();
  }

  function clearToBuy() {
    items.forEach(i => { if (i.checked) i.checked = false; });
    markDirty(); render();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlightMatch(name, q) {
    const safe = escHtml(name);
    const safeQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark>$1</mark>');
  }

  // ── Enter key + live filter ───────────────────────────────
  const newItemInput = document.getElementById('newItem');
  newItemInput.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  newItemInput.addEventListener('input', e => { filter = e.target.value; render(); });

  // ── Pull to refresh ───────────────────────────────────────
  let startY = 0;
  document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 80 && window.scrollY === 0) fetchList();
  }, { passive: true });

  // ── Config ────────────────────────────────────────────────
  let pendingSortType = null;

  function setSortType(type) {
    pendingSortType = type;
    document.getElementById('sortOptTobuy').classList.toggle('selected', type === 'tobuy');
    document.getElementById('sortOptCategory').classList.toggle('selected', type === 'category');
  }

  function populateCatIconEditor() {
    const editor = document.getElementById('catIconEditor');
    editor.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const cell = document.createElement('div');
      cell.className = 'cat-option cat-icon-edit-cell';
      cell.dataset.catId = cat.id;

      const display = document.createElement('span');
      display.className = 'cat-icon-display';
      display.textContent = cat.icon;

      const inp = document.createElement('input');
      inp.className = 'cat-icon-inp';
      inp.value = cat.icon;
      inp.autocomplete = 'off';
      inp.spellcheck = false;

      const lbl = document.createElement('span');
      lbl.textContent = cat.label;

      cell.appendChild(display);
      cell.appendChild(inp);
      cell.appendChild(lbl);

      function lastGrapheme(str) {
        if (typeof Intl !== 'undefined' && Intl.Segmenter) {
          const segs = [...new Intl.Segmenter().segment(str)];
          return segs.length ? segs[segs.length - 1].segment : str;
        }
        return str.slice(-2);
      }

      function confirmEdit() {
        const val = inp.value.trim();
        if (val) display.textContent = lastGrapheme(val);
        cell.classList.remove('editing');
      }

      inp.addEventListener('input', () => {
        if (inp.value.trim()) inp.value = lastGrapheme(inp.value);
      });
      inp.addEventListener('blur', confirmEdit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } });

      display.addEventListener('click', e => {
        e.stopPropagation();
        inp.value = '';
        cell.classList.add('editing');
        setTimeout(() => inp.focus(), 50);
      });

      editor.appendChild(cell);
    });
  }

  function openConfig() {
    document.getElementById('cfgToken').value = cfg.token;
    pendingSortType = sortType;
    document.getElementById('sortOptTobuy').classList.toggle('selected', sortType === 'tobuy');
    document.getElementById('sortOptCategory').classList.toggle('selected', sortType === 'category');
    populateCatIconEditor();
    document.getElementById('configOverlay').classList.add('open');
  }
  function closeConfig() {
    pendingSortType = null;
    document.getElementById('configOverlay').classList.remove('open');
  }
  function saveConfig() {
    cfg.token = document.getElementById('cfgToken').value.trim();
    localStorage.setItem('gh_token', cfg.token);
    if (pendingSortType !== sortType) {
      sortType = pendingSortType;
      localStorage.setItem('sort_type', sortType);
    }
    pendingSortType = null;
    document.querySelectorAll('.cat-icon-edit-cell').forEach(cell => {
      const id  = cell.dataset.catId;
      const val = cell.querySelector('.cat-icon-display').textContent.trim();
      if (val && val !== (_defaultIcons[id])) localCatIcons[id] = val;
      else delete localCatIcons[id];
    });
    localStorage.setItem('cat_icons', JSON.stringify(localCatIcons));
    applyCatIcons();
    closeConfig();
    render();
    fetchList();
  }

  // ── Category filter ───────────────────────────────────────
  function openCatFilter() {
    const grid = document.getElementById('catFilterGrid');
    grid.innerHTML = '';
    // Add "All" option
    const all = document.createElement('button');
    all.className = 'cat-option' + (!filterCategory ? ' selected' : '');
    all.innerHTML = `<span>🛒</span><span>Sve</span>`;
    all.onclick = () => { filterCategory = null; updateFilterBtn(); closeCatFilter(); render(); };
    grid.appendChild(all);
    CATEGORIES.forEach(cat => {
      const opt = document.createElement('button');
      opt.className = 'cat-option' + (filterCategory === cat.id ? ' selected' : '');
      opt.innerHTML = `<span>${cat.icon}</span><span>${cat.label}</span>`;
      opt.onclick = () => { filterCategory = cat.id; updateFilterBtn(); closeCatFilter(); render(); };
      grid.appendChild(opt);
    });
    document.getElementById('catFilterOverlay').classList.add('open');
  }

  function closeCatFilter() {
    document.getElementById('catFilterOverlay').classList.remove('open');
  }

  function updateFilterBtn() {
    const btn = document.getElementById('filterBtn');
    if (filterCategory) {
      const cat = catById(filterCategory);
      btn.innerHTML = `<span style="font-size:1.2rem">${cat.icon}</span>`;
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
      btn.innerHTML = `<span style="font-size:1.2rem">🛒</span>`;
    }
  }

  // ── Category picker for existing items ────────────────────
  let catPickerItemId = null;

  function openCatPicker(id) {
    catPickerItemId = id;
    const item = items.find(i => i.id === id);
    document.querySelector('#catOverlay h3').textContent = item ? 'Odaberi kategoriju za ‘' + item.name + '’' : 'Odaberi kategoriju';
    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const opt = document.createElement('button');
      opt.className = 'cat-option' + (item && item.category === cat.id ? ' selected' : '');
      opt.innerHTML = `<span>${cat.icon}</span><span>${cat.label}</span>`;
      opt.onclick = () => {
        const it = items.find(i => i.id === catPickerItemId);
        if (it) { it.category = cat.id; markDirty(); render(); }
        closeCatPicker();
      };
      grid.appendChild(opt);
    });
    document.getElementById('catOverlay').classList.add('open');
  }

  function closeCatPicker() {
    catPickerItemId = null;
    document.getElementById('catOverlay').classList.remove('open');
  }

  // ── Quantity picker (inline) ──────────────────────────────
  let qtyPickerItemId = null;
  let qtyMode = 'stepper';
  let qtyCurrent = 1;

  function openQtyPicker(id) {
    closeQtyPicker();
    qtyPickerItemId = id;
    const item = items.find(i => i.id === id);
    if (!item) return;

    const qty = item.qty;
    const isNum = typeof qty === 'number' && qty >= 0;
    qtyCurrent = isNum ? qty : 1;
    qtyMode = (qty != null && qty !== '' && typeof qty !== 'number') ? 'text' : 'stepper';

    const inline = document.createElement('div');
    inline.className = 'qty-inline';
    inline.id = 'qty-inline-' + id;

    const stepperRow = document.createElement('div');
    stepperRow.className = 'qty-stepper-row' + (qtyMode === 'text' ? ' hidden' : '');
    stepperRow.innerHTML = `
      <button class="qty-step-btn" onclick="qtyAdjust(-1)">−</button>
      <button class="qty-num-btn" id="qtyNumBtn" onclick="qtySwitchToText()">${qtyCurrent}</button>
      <button class="qty-step-btn" onclick="qtyAdjust(1)">+</button>`;

    const textRow = document.createElement('div');
    textRow.className = 'qty-text-row' + (qtyMode === 'text' ? ' visible' : '');
    textRow.innerHTML = `
      <input type="text" class="qty-text-input" id="qtyTextInput"
        value="${escHtml(qtyMode === 'text' ? String(qty) : '')}"
        placeholder="npr. 500g, 1.5kg…" autocorrect="off" />
      <button class="qty-back-btn" onclick="qtySwitchToStepper()">← broj</button>`;

    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:6px;flex-shrink:0';
    actions.innerHTML = `
      <button class="qty-confirm-btn" onclick="qtySave()">✓</button>
      <button class="qty-dismiss-btn" onclick="closeQtyPicker()">✕</button>`;

    inline.appendChild(stepperRow);
    inline.appendChild(textRow);
    inline.appendChild(actions);

    const wrap = document.getElementById('wrap-' + id);
    if (wrap) wrap.after(inline);

    if (qtyMode === 'text') setTimeout(() => document.getElementById('qtyTextInput')?.focus(), 80);
  }

  function qtyAdjust(delta) {
    qtyCurrent = Math.max(0, qtyCurrent + delta);
    document.getElementById('qtyNumBtn').textContent = qtyCurrent;
  }

  function qtySwitchToText() {
    qtyMode = 'text';
    const textRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-text-row');
    const stepperRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-stepper-row');
    document.getElementById('qtyTextInput').value = String(qtyCurrent);
    stepperRow.classList.add('hidden');
    textRow.classList.add('visible');
    setTimeout(() => document.getElementById('qtyTextInput')?.focus(), 80);
  }

  function qtySwitchToStepper() {
    qtyMode = 'stepper';
    const val = document.getElementById('qtyTextInput').value.trim();
    const n = parseInt(val, 10);
    qtyCurrent = (!isNaN(n) && n > 0) ? n : 1;
    document.getElementById('qtyNumBtn').textContent = qtyCurrent;
    const textRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-text-row');
    const stepperRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-stepper-row');
    textRow.classList.remove('visible');
    stepperRow.classList.remove('hidden');
  }

  function qtySave() {
    const item = items.find(i => i.id === qtyPickerItemId);
    if (!item) return;
    if (qtyMode === 'stepper') {
      if (qtyCurrent === 0) {
        delete item.qty;
        item.checked = false;
      } else {
        item.qty = qtyCurrent;
        item.checked = true;
      }
    } else {
      const val = document.getElementById('qtyTextInput').value.trim();
      if (!val) {
        delete item.qty;
      } else {
        const n = parseInt(val, 10);
        const isZero = val === '0' || val === '00';
        if (isZero) {
          delete item.qty;
          item.checked = false;
        } else {
          item.qty = (String(n) === val && n > 0) ? n : val;
          item.checked = true;
        }
      }
    }
    closeQtyPicker();
    markDirty(); render();
  }

  function closeQtyPicker() {
    if (qtyPickerItemId) {
      document.getElementById('qty-inline-' + qtyPickerItemId)?.remove();
      qtyPickerItemId = null;
    }
  }

  // ── Share ─────────────────────────────────────────────────
  function shareList() {
    const toBuy = items.filter(i => i.checked);
    if (toBuy.length === 0) { showToast('Nema artikala za kupnju'); return; }
    const text = '🛒 Namirnice za kupiti:\n' + toBuy.map(i => {
      if (i.qty == null || i.qty === '') return '• ' + i.name;
      const qtyStr = typeof i.qty === 'number' ? '× ' + i.qty : i.qty;
      return '• ' + i.name + ' (' + qtyStr + ')';
    }).join('\n');
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {});
    } else {
      window.prompt('Kopiraj i podijeli:', text);
    }
  }

  // ── Init ──────────────────────────────────────────────────
  loadLocal();
  if (items.length > 0) render();
  if (cfg.user && cfg.token) fetchList();
  else openConfig();
</script>
</body>
