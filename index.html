<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Namirnice" />
  <title>Namirnice</title>
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="theme-color" content="#2d6a4f" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #1a1a1a;
      --ink-light: #888;
      --accent: #2d6a4f;
      --danger: #c1440e;
      --border: #e8e2d9;
      --checked-bg: #f0f0ec;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 52px 24px 20px;
      position: sticky; top: 0; z-index: 10;
    }



    .sync-bar {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; font-size: 0.75rem;
      color: var(--ink-light); font-weight: 300;
    }

    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink-light); transition: background 0.3s; flex-shrink: 0;
    }
    .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
    .sync-dot.ok      { background: var(--accent); }
    .sync-dot.error   { background: var(--danger); }
    .sync-dot.dirty   { background: #f0a500; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .gear-btn {
      position: absolute; top: 46px; right: 16px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 10px;
    }
    .share-btn {
      position: absolute; top: 46px; right: 56px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 10px;
    }
    .clear-header-btn {
      position: absolute; top: 46px; right: 96px;
      background: none; border: none; color: var(--ink-light); cursor: pointer; padding: 10px;
    }

    .add-bar {
      display: flex; gap: 10px; padding: 12px;
      background: var(--card); border-bottom: 1px solid var(--border);
      position: sticky; top: 101px; z-index: 9;
    }

    .add-bar input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
      background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.2s;
    }
    .add-bar input:focus { border-color: var(--accent); }
    .add-bar input::placeholder { color: var(--ink-light); }

    .add-bar button {
      background: transparent; color: var(--accent); border: none; border-radius: 10px;
      width: 48px; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .add-bar button:active { opacity: 0.8; transform: scale(0.95); }

    .add-bar-actions {
      display: flex; align-items: center; gap: 0; flex-shrink: 0;
    }
    .add-bar .filter-btn {
      background: transparent; border: none; border-radius: 10px;
      width: 30px; height: 48px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: opacity 0.2s;
    }
    .filter-btn-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; font-size: 0.65rem; line-height: 1.3;
    }

    .list-wrap { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

    .section-label {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--ink-light); margin-top: 8px; margin-bottom: 2px;
    }

    /* Swipe row */
    .item-wrap {
      position: relative; border-radius: 12px;
      overflow: hidden; animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-delete-bg {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 90px;
      background: var(--danger);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.85rem; font-weight: 500;
      gap: 5px; border-radius: 12px;
      cursor: pointer;
    }

    .item {
      position: relative; background: var(--card); border-radius: 12px;
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: background 0.2s; touch-action: pan-y;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .item.checked { background: var(--checked-bg); border-color: transparent; box-shadow: none; }

    .check-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border); background: white;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .item.checked .check-btn { background: var(--accent); border-color: var(--accent); }
    .item.checked .item-name { color: var(--ink); }
    .item:not(.checked) .check-btn { background: white; border-color: var(--border); }
    .item:not(.checked) .item-name { color: var(--ink-light); }
    .item-name { flex: 1; font-size: var(--item-font-size, 1.3rem); font-weight: 400; transition: color 0.2s; }
    .item-name[contenteditable="true"] { outline: none; border-bottom: 1.5px solid var(--accent); cursor: text; color: var(--ink); }

    .empty { text-align: center; padding: 60px 24px; color: var(--ink-light); }
    .empty p:first-child {
      font-family: 'DM Serif Display', serif; font-size: 1.3rem;
      font-style: italic; margin-bottom: 6px; color: var(--ink);
    }
    .empty p:last-child { font-size: 0.85rem; font-weight: 300; }


    /* Config sheet */
    .config-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end;
    }
    .config-overlay.open { display: flex; }

    .config-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp 0.25s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .config-sheet h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 4px; }
    .config-hint { font-size: 0.75rem; color: var(--ink-light); margin-bottom: 10px; font-weight: 300; }
    .config-sheet label, .config-label {
      display: block; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px;
    }
    .config-sheet input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-family: monospace; font-size: 1rem;
      background: var(--bg); color: var(--ink); outline: none; margin-bottom: 16px;
    }
    .config-sheet input:focus { border-color: var(--accent); }
    .config-actions {
      display: flex; gap: 10px;
    }
    .config-save {
      flex: 1; background: var(--accent); color: white; border: none;
      border-radius: 12px; padding: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer;
    }
    .config-cancel {
      flex: 1; background: none; border: 1.5px solid var(--border); color: var(--ink-light);
      border-radius: 12px; padding: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 0.85rem; transition: transform 0.3s ease;
      z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    mark { background: #fff0a0; color: var(--ink); border-radius: 2px; padding: 0 1px; }

    /* Category icon on item */
    .cat-icon {
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .cat-icon:active { opacity: 1; }

    /* Category picker overlay */
    .cat-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end;
    }
    .cat-overlay.open { display: flex; }
    .cat-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp 0.22s ease;
    }
    .cat-sheet h3 {
      font-family: 'DM Serif Display', serif; font-size: 1.2rem;
      margin-bottom: 16px; color: var(--ink);
    }
    .cat-filter-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .cat-filter-header h3 { margin-bottom: 0; }
    .cat-filter-all-btn {
      padding: 6px 16px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg);
      color: var(--ink-light); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; cursor: pointer; transition: all 0.15s;
    }
    .cat-filter-all-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
    .cat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .cat-option {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 7px 6px; border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.15s;
    }
    .cat-option.selected { border-color: var(--accent); background: #d8f3dc; }
    .cat-option span:first-child { font-size: 1.5rem; }
    .cat-option span:last-child, .cat-option-label { font-size: 0.8rem; color: var(--ink-light); text-align: center; }
    .cat-close {
      width: 100%; background: none; border: none; color: var(--ink-light);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; padding: 8px;
    }

    /* Changes notification sheet */
    .changes-list { margin: 4px 0 20px; }
    .changes-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.95rem; color: var(--ink);
    }
    .changes-item:last-child { border-bottom: none; }
    .changes-item-icon { font-size: 1.3rem; flex-shrink: 0; }

    /* Photo on item row */
    .item-photo-btn {
      background: none; border: none; cursor: pointer; flex-shrink: 0;
      padding: 0; color: var(--ink);
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      opacity: 0.25;
    }
    .item-photo-btn--has { opacity: 1; color: var(--accent); }
    .photo-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end;
    }
    .photo-overlay.open { display: flex; }
    .photo-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      width: 100%; animation: slideUp 0.25s ease;
    }
    .photo-sheet-img {
      width: 100%; max-height: 50vh; border-radius: 12px;
      object-fit: contain; background: var(--bg); margin-bottom: 16px;
    }
    .photo-sheet-actions { display: flex; gap: 10px; }
    .photo-remove-btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      background: #fff0f0; color: #ff3b30;
    }
    .photo-close-btn {
      flex: 1; padding: 12px; border-radius: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      background: var(--bg); color: var(--ink-light); border: 1.5px solid var(--border);
    }

    /* Quantity badge on item row */
    .qty-badge {
      font-size: 0.75rem; color: var(--ink-light); font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 1px 6px; flex-shrink: 0;
    }

    /* Inline quantity editor */
    .qty-inline {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 14px;
      margin: -2px 4px 0; animation: slideIn 0.15s ease;
    }
    .qty-stepper-row {
      display: flex; align-items: center; gap: 6px; flex: 1;
    }
    .qty-stepper-row.hidden { display: none; }
    .qty-step-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: 1.1rem; cursor: pointer; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.1s;
    }
    .qty-step-btn:active { background: var(--border); }
    .qty-num-btn {
      min-width: 44px; height: 34px; padding: 0 10px;
      border: 1.5px solid var(--accent); border-radius: 8px;
      background: white; font-size: 1rem; font-weight: 500;
      color: var(--accent); cursor: pointer;
    }
    .qty-text-row {
      display: none; flex: 1; align-items: center; gap: 6px;
    }
    .qty-text-row.visible { display: flex; }
    .qty-text-input {
      flex: 1; border: 1.5px solid var(--accent); border-radius: 8px;
      padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
      background: var(--bg); color: var(--ink); outline: none;
    }
    .qty-back-btn {
      background: none; border: none; color: var(--ink-light); font-size: 0.75rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0; flex-shrink: 0;
    }
    .qty-confirm-btn, .qty-dismiss-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      cursor: pointer; font-size: 0.9rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-confirm-btn { background: var(--accent); color: white; }
    .qty-dismiss-btn { background: var(--bg); color: var(--ink-light); border: 1.5px solid var(--border); }

    .cat-icon-editor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .cat-icon-edit-cell { cursor: grab; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .cat-icon-edit-cell.editing { cursor: default; }
    .cat-icon-edit-cell .cat-icon-display { font-size: 1.5rem; }
    .cat-icon-edit-cell.editing .cat-icon-display { display: none; }
    .cat-icon-inp {
      display: none; width: 2.4rem; height: 2.4rem; text-align: center; font-size: 1.4rem;
      border: 1.5px solid var(--accent); border-radius: 8px;
      background: white; outline: none; padding: 0; caret-color: transparent;
    }
    .cat-icon-edit-cell.editing .cat-icon-inp { display: block; }
    .cat-icon-delete-btn {
      position: absolute; top: 3px; right: 3px;
      font-size: 0.65rem; line-height: 1; color: var(--ink-light);
      background: none; border: none; cursor: pointer; padding: 2px;
    }
    .cat-icon-add-tile {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 6px; border-radius: 12px;
      border: 1.5px dashed var(--border); background: var(--bg);
      cursor: pointer; color: var(--ink-light); font-size: 1.5rem; transition: all 0.15s;
    }
    .cat-icon-add-tile:active { border-color: var(--accent); color: var(--accent); }
    .cat-icon-add-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      background: var(--bg); border-radius: 12px; padding: 10px 12px;
      border: 1.5px solid var(--accent);
    }
    .cat-icon-add-row input[type=text] {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--ink);
    }
    .cat-icon-add-confirm, .cat-icon-add-cancel {
      border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer;
      font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
    }
    .cat-icon-add-confirm { background: var(--accent); color: white; }
    .cat-icon-add-cancel  { background: var(--border); color: var(--ink-light); }

    .sort-cycle-btn {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; margin-bottom: 16px; transition: border-color 0.15s; text-align: left;
    }
    .sort-cycle-btn:active { border-color: var(--accent); }
    .notify-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    .notify-row input { flex: 1; margin-bottom: 0; }
    .notify-app-btn { width: auto; flex-shrink: 0; margin-bottom: 0; white-space: nowrap; }

  </style>
</head>
<body>

<header>
  <h1 class="sr-only">Namirnice</h1>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Nije konfigurirano</span>
  </div>
  <button class="gear-btn" onclick="openConfig()" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <button class="share-btn" onclick="shareList()" aria-label="Share">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </button>
  <button class="clear-header-btn" onclick="clearToBuy()" aria-label="Clear to buy">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
  </button>
</header>

<div class="add-bar">
  <input type="text" id="newItem" placeholder="Dodaj / pretraži artikl…" autocomplete="off" autocorrect="off" />
  <div class="add-bar-actions">
    <button class="filter-btn" id="filterBtn" onclick="openCatFilter()" aria-label="Filtriraj po kategoriji">
      <span style="font-size:1.2rem">🛒</span>
    </button>
    <button onclick="addItem()" aria-label="Dodaj artikl">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</div>
<div class="list-wrap" id="listWrap"></div>
<div class="toast" id="toast"></div>

<!-- Category filter picker -->
<div class="cat-overlay" id="catFilterOverlay" onclick="closeCatFilter()">
  <div class="cat-sheet" onclick="event.stopPropagation()">
    <div class="cat-filter-header">
      <h3>Filtriraj po kategoriji</h3>
      <button id="catFilterAllBtn" class="cat-filter-all-btn">Sve</button>
    </div>
    <div class="cat-grid" id="catFilterGrid"></div>
  </div>
</div>

<!-- Hidden photo file input -->
<input type="file" id="photoInput" accept="image/*" style="display:none">

<!-- Photo preview overlay -->
<div class="photo-overlay" id="photoOverlay" onclick="closePhoto()">
  <div class="photo-sheet" onclick="event.stopPropagation()">
    <img class="photo-sheet-img" id="photoOverlayImg" src="" alt="Slika">
    <div class="photo-sheet-actions">
      <button class="photo-remove-btn" onclick="removePhoto()">Ukloni</button>
      <button class="photo-close-btn"  onclick="closePhoto()">Zatvori</button>
    </div>
  </div>
</div>

<!-- Config -->
<div class="config-overlay" id="configOverlay" onclick="closeConfig()">
  <div class="config-sheet" onclick="event.stopPropagation()">
    <h2>Postavke</h2>
    <label for="cfgToken">GitHub osobni token</label>
    <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
    <p class="config-label">Obavijesti</p>
    <div class="notify-row">
      <input type="tel" id="cfgNotifyPhone" placeholder="+385912345678" autocomplete="off" />

        <span id="notifyAppLabel">WhatsApp</span><span>↕</span>
      </button>

      <span id="fontSizeCycleLabel"></span><span>↕</span>
    </button>

    <button class="sort-cycle-btn" id="sortCycleBtn" onclick="cycleSortType()">
      <span id="sortCycleLabel"></span><span>↕</span>
    </button>
    <p class="config-label">Ikone kategorija</p>
    <p class="config-hint">Tapni ikonu za promjenu emojija<br>Drži i povuci za promjenu redoslijeda</p>
    <div id="catIconEditor" class="cat-icon-editor"></div>
    <div id="catIconAddRow" class="cat-icon-add-row" style="display:none"></div>
    <div class="config-actions">
      <button class="config-cancel" onclick="closeConfig()">Odustani</button>
      <button class="config-save" onclick="saveConfig()">Spremi</button>

<script>
  // ── Config ───────────────────────────────────────────────
  let cfg = {
    user:        'okinkela',
    repo:        'groceries',
    token:       localStorage.getItem('gh_token') || '',
    notifyPhone: localStorage.getItem('notify_phone') || '',
    notifyApp:   localStorage.getItem('notify_app')   || ''
  };

  let items   = [];
  let fileSha = '';
  let dirty   = false;
  let pushing = false;
  let filter  = '';
  let filterCategory = null; // null = all
  let sortType  = localStorage.getItem('sort_type')   || 'category';
  let fontSize  = localStorage.getItem('font_size')   || 'normal';

  const fontSizes = {
    normal: { label: 'Normalni',    value: '1.3rem'  },
    large:  { label: 'Veliki',      value: '1.6rem'  },
    xlarge: { label: 'Vrlo veliki', value: '1.9rem'  }
  };
  const fontSizeOrder = ['normal', 'large', 'xlarge'];

  // Migrate old keys (small → normal, medium → normal)
  if (!fontSizes[fontSize]) { fontSize = 'normal'; localStorage.setItem('font_size', fontSize); }

  function applyFontSize(size) {
    const sz = fontSizes[size] || fontSizes['normal'];
    document.documentElement.style.setProperty('--item-font-size', sz.value);
  }
  applyFontSize(fontSize);

  function lastGrapheme(str) {
    if (typeof Intl !== 'undefined' && Intl.Segmenter) {
      const segs = [...new Intl.Segmenter().segment(str)];
      return segs.length ? segs[segs.length - 1].segment : str;
    }
    return str.slice(-2);
  }

  let categories    = [];
  let localCatIcons = JSON.parse(localStorage.getItem('cat_icons') || '{}');
  let localCatOrder = JSON.parse(localStorage.getItem('cat_order') || 'null');

  const FALLBACK_CATEGORY = { id: 'other', icon: '❓', label: 'Ostalo' };

  function ensureFallbackCategory(cats) {
    if (!cats.some(c => c.id === 'other'))
      cats.push({ ...FALLBACK_CATEGORY, _baseIcon: FALLBACK_CATEGORY.icon });
    return cats;
  }

  function applyCatIcons() {
    categories.forEach(c => { c.icon = localCatIcons[c.id] ?? c._baseIcon; });
  }

  function applyLocalOrder(cats) {
    if (!localCatOrder) return cats;
    const valid = new Set(cats.map(c => c.id));
    const ordered = localCatOrder.filter(id => valid.has(id)).map(id => cats.find(c => c.id === id));
    const appended = cats.filter(c => !localCatOrder.includes(c.id));
    return [...ordered, ...appended];
  }

  function catById(id) {
    return categories.find(c => c.id === id) || categories.find(c => c.id === 'other') || { ...FALLBACK_CATEGORY };
  }

  // ── Local persistence ────────────────────────────────────
  function saveLocal() {
    localStorage.setItem('items_cache', JSON.stringify(items));
    localStorage.setItem('items_sha',   fileSha);
    localStorage.setItem('categories_cache', JSON.stringify(
      categories.map(c => ({ id: c.id, icon: c._baseIcon, label: c.label }))
    ));
  }

  function loadLocal() {
    if (localStorage.getItem('cache_v') !== '2') {
      ['items_cache','items_sha','categories_cache'].forEach(k => localStorage.removeItem(k));
      localStorage.setItem('cache_v', '2');
    }
    const cached = localStorage.getItem('items_cache');
    const sha    = localStorage.getItem('items_sha');
    if (cached) { items = JSON.parse(cached); fileSha = sha || ''; }
    const catCached = localStorage.getItem('categories_cache');
    if (catCached) categories = JSON.parse(catCached).map(c => ({ ...c, _baseIcon: c.icon }));
    ensureFallbackCategory(categories);
    categories = applyLocalOrder(categories);
    applyCatIcons();
  }

  // ── Sync status ──────────────────────────────────────────
  function setSync(state, msg) {
    document.getElementById('syncDot').className = 'sync-dot ' + state;
    document.getElementById('syncLabel').textContent = msg;
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── GitHub API ────────────────────────────────────────────
  function apiUrl() {
    return `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/groceries.json`;
  }

  async function fetchList() {
    if (!cfg.user || !cfg.token) { openConfig(); return; }
    if (dirty) return; // don't overwrite unsaved local changes
    setSync('syncing', 'Sinkronizacija…');
    try {
      const hadItems = items.length > 0;
      const localIds = new Set(items.map(i => i.id));

      const res = await fetch(apiUrl(), {
        headers: { Authorization: `token ${cfg.token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      fileSha = data.sha;
      const bytes = Uint8Array.from(atob(data.content.replace(/\n/g, '')), c => c.charCodeAt(0));
      const raw = JSON.parse(new TextDecoder().decode(bytes));
      items = raw.items || [];
      categories = (raw.categories || []).map(c => ({ ...c, _baseIcon: c.icon }));
      ensureFallbackCategory(categories);
      categories = applyLocalOrder(categories);
      applyCatIcons();
      saveLocal();
      render();
      updateFilterBtn();
      setSync('ok', 'Sinkronizirano');

      if (hadItems) {
        const added = items.filter(i => i.checked && !localIds.has(i.id));
        if (added.length > 0) showChanges(added);
      }
    } catch {
      setSync('error', 'Greška — pokušavam ponovo');
    }
  }

  async function pushList() {
    if (!cfg.user || !cfg.token || pushing) return;
    pushing = true;
    setSync('syncing', 'Spremanje…');
    try {
      const res = await fetch(apiUrl(), {
        method: 'PUT',
        headers: {
          Authorization: `token ${cfg.token}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'update groceries',
          content: (() => {
            const json = JSON.stringify({
              categories: categories.map(c => ({ id: c.id, icon: c._baseIcon, label: c.label })),
              items
            });
            const encoded = btoa(String.fromCharCode(...new TextEncoder().encode(json)));
            return encoded;
          })(),
          sha: fileSha
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (res.status === 422 && err.message?.includes('too large')) {
          setSync('error', 'Datoteka prevelika — ukloni slike');
        } else {
          throw new Error(res.status);
        }
        return;
      }
      const data = await res.json();
      fileSha = data.content.sha;
      saveLocal();
      dirty = false;
      setSync('ok', 'Spremljeno');
    } catch {
      setSync('dirty', 'Nije spremljeno — pokušavam ponovo');
    } finally {
      pushing = false;
    }
  }

  function markDirty() {
    dirty = true;
    saveLocal();
    setSync('dirty', 'Čeka spremanje…');
  }

  // Every 30s: push if dirty, fetch if clean
  setInterval(() => { dirty ? pushList() : fetchList(); }, 30000);

  // ── Render ────────────────────────────────────────────────
  function render(scrollToId) {
    closeQtyPicker();
    const wrap = document.getElementById('listWrap');
    const q = filter.trim();
    const qNorm = normalizeStr(q);
    let visible = items;
    if (filterCategory) visible = visible.filter(i => i.category === filterCategory);
    if (q) visible = visible.filter(i => normalizeStr(i.name).includes(qNorm));

    wrap.innerHTML = '';

    if (visible.length === 0) {
      wrap.innerHTML = (q || filterCategory)
        ? `<div class="empty"><p>Nema rezultata</p><p>Tapni + za dodati "${escHtml(filter)}"</p></div>`
        : `<div class="empty"><p>Još ništa</p><p>Dodaj prvi artikl gore</p></div>`;
      return;
    }

    const catOrder = Object.fromEntries(categories.map((c, i) => [c.id, i]));
    const alpha = (a, b) => a.name.localeCompare(b.name, 'hr');
    const byCat = (a, b) => (catOrder[a.category] ?? 99) - (catOrder[b.category] ?? 99);
    const hl = q || null;

    if (sortType === 'tobuy') {
      const toBuy    = visible.filter(i =>  i.checked).sort((a, b) => byCat(a, b) || alpha(a, b));
      const inactive = visible.filter(i => !i.checked).sort((a, b) => byCat(a, b) || alpha(a, b));
      if (toBuy.length > 0) {
        wrap.appendChild(sectionLabel('Za kupiti'));
        toBuy.forEach(item => wrap.appendChild(makeItemEl(item, hl)));
      }
      inactive.forEach(item => wrap.appendChild(makeItemEl(item, hl)));
    } else {
      const knownCatIds = new Set(categories.map(c => c.id));
      categories.forEach(cat => {
        const catItems = cat.id === 'other'
          ? visible.filter(i => i.category === 'other' || !knownCatIds.has(i.category))
          : visible.filter(i => i.category === cat.id);
        if (catItems.length === 0) return;
        const toBuy    = catItems.filter(i =>  i.checked).sort(alpha);
        const inactive = catItems.filter(i => !i.checked).sort(alpha);
        if (!filterCategory) wrap.appendChild(sectionLabel(`${cat.icon} ${cat.label}`));
        [...toBuy, ...inactive].forEach(item => wrap.appendChild(makeItemEl(item, hl)));
      });
    }

    if (scrollToId) {
      setTimeout(() => {
        const el = document.getElementById('wrap-' + scrollToId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }
  }

  function sectionLabel(text) {
    const d = document.createElement('div');
    d.className = 'section-label';
    d.textContent = text;
    return d;
  }

  function makeItemEl(item, highlight) {
    const wrap = document.createElement('div');
    wrap.className = 'item-wrap';
    wrap.id = 'wrap-' + item.id;

    // Red background shown during swipe
    const bg = document.createElement('div');
    bg.className = 'item-delete-bg';
    bg.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
      Ukloni`;
    wrap.appendChild(bg);

    // Item row
    const el = document.createElement('div');
    el.className = 'item' + (item.checked ? ' checked' : '');
    const displayName = highlight ? highlightMatch(item.name, highlight) : escHtml(item.name);
    const cat = catById(item.category);
    const hasQty = item.qty != null && item.qty !== '';
    const qtyDisplay = hasQty
      ? (typeof item.qty === 'number' ? '× ' + item.qty : escHtml(String(item.qty)))
      : '× 1';
    const showQty = item.checked || hasQty;
    const qtyHtml = showQty ? `<span class="qty-badge" onclick="openQtyPicker('${item.id}')" style="cursor:pointer">${qtyDisplay}</span>` : '';
    const svgCamOutline = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
    const svgCamFilled = `<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3.5" fill="white"/></svg>`;
    const photoBtn = item.photo
      ? `<button class="item-photo-btn item-photo-btn--has" onclick="openPhoto('${item.id}')" aria-label="Prikaži sliku">${svgCamFilled}</button>`
      : `<button class="item-photo-btn" onclick="pickPhoto('${item.id}')" aria-label="Dodaj sliku">${svgCamOutline}</button>`;
    el.innerHTML = `
      <button class="check-btn" onclick="toggle('${item.id}')"></button>
      <span class="item-name">${displayName}</span>
      ${qtyHtml}
      ${photoBtn}
      <span class="cat-icon" onclick="openCatPicker('${item.id}')" title="${cat.label}">${cat.icon}</span>
    `;

    // Long press (touch) or right-click (desktop) to open quantity picker
    let lpTimer = null;
    el.addEventListener('touchstart', () => {
      lpTimer = setTimeout(() => { lpTimer = null; openQtyPicker(item.id); }, 500);
    }, { passive: true });
    el.addEventListener('touchmove',  () => { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
    el.addEventListener('touchend',   () => { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
    el.addEventListener('contextmenu', e => { e.preventDefault(); openQtyPicker(item.id); });

    // Long press on item name → edit name in-place
    const nameSpan = el.querySelector('.item-name');
    if (nameSpan) {
      let nameLpTimer = null;
      nameSpan.addEventListener('touchstart', e => {
        e.stopPropagation();
        nameLpTimer = setTimeout(() => { nameLpTimer = null; editItemName(item.id); }, 500);
      }, { passive: true });
      nameSpan.addEventListener('touchmove',  () => { clearTimeout(nameLpTimer); nameLpTimer = null; }, { passive: true });
      nameSpan.addEventListener('touchend',   () => { clearTimeout(nameLpTimer); nameLpTimer = null; }, { passive: true });
      nameSpan.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); editItemName(item.id); });
    }

    // Long press on qty badge opens directly in text mode
    const badge = el.querySelector('.qty-badge');
    if (badge) {
      let badgeLpTimer = null;
      badge.addEventListener('touchstart', e => {
        e.stopPropagation();
        badgeLpTimer = setTimeout(() => { badgeLpTimer = null; openQtyPicker(item.id, 'text'); }, 500);
      }, { passive: true });
      badge.addEventListener('touchmove',  () => { clearTimeout(badgeLpTimer); badgeLpTimer = null; }, { passive: true });
      badge.addEventListener('touchend',   () => { clearTimeout(badgeLpTimer); badgeLpTimer = null; }, { passive: true });
      badge.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); openQtyPicker(item.id, 'text'); });
    }

    wrap.appendChild(el);
    attachSwipe(el, item);
    return wrap;
  }

  // ── Swipe left to delete ──────────────────────────────────
  function attachSwipe(el, item) {
    let startX = 0, curX = 0, active = false, revealed = false;
    const REVEAL = 90;

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      curX = 0; active = true;
      el.style.transition = 'none';
      el.style.willChange = 'transform';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!active) return;
      const dx = e.touches[0].clientX - startX;
      if (revealed) {
        const newX = -REVEAL + dx;
        const clamped = Math.min(0, Math.max(newX, -REVEAL));
        el.style.marginRight = Math.abs(clamped) + 'px';
        curX = clamped;
      } else {
        if (dx > 0) return;
        curX = dx;
        el.style.marginRight = Math.min(Math.abs(dx), REVEAL) + 'px';
      }
    }, { passive: true });

    el.addEventListener('touchend', () => {
      if (!active) return;
      active = false;
      el.style.willChange = '';
      el.style.transition = 'margin-right 0.2s ease';
      if (revealed) {
        if (curX > -REVEAL / 2) {
          el.style.marginRight = '0px';
          revealed = false;
        } else {
          el.style.marginRight = REVEAL + 'px';
        }
      } else {
        if (curX < -REVEAL / 2) {
          el.style.marginRight = REVEAL + 'px';
          revealed = true;
        } else {
          el.style.marginRight = '0px';
        }
      }
    });

    el.addEventListener('touchcancel', () => {
      active = false;
      el.style.willChange = '';
    }, { passive: true });

    // Tap red bg to delete
    const wrap = el.parentElement;
    wrap.querySelector('.item-delete-bg').addEventListener('click', () => {
      items = items.filter(i => i.id !== item.id);
      markDirty(); render();
    });
  }

  // ── Actions ───────────────────────────────────────────────
  function addItem() {
    const input = document.getElementById('newItem');
    const name  = input.value.trim();
    if (!name) return;
    const id = Date.now().toString();
    items.unshift({ id, name, checked: true, category: filterCategory || 'other' });
    input.value = '';
    filter = '';
    markDirty();
    render(id);
  }

  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    // Flash the button green/grey before sort
    const itemEl = document.querySelector(`#wrap-${id} .item`);
    if (itemEl) {
      itemEl.style.transition = 'background 0.15s';
      itemEl.style.background = '#d8f3dc';
      setTimeout(() => { itemEl.style.background = ''; }, 200);
    }

    // Apply change after brief flash
    setTimeout(() => {
      // FLIP: record positions before change
      const wrap = document.getElementById('listWrap');
      const before = {};
      wrap.querySelectorAll('.item-wrap[id]').forEach(el => {
        before[el.id] = el.getBoundingClientRect().top;
      });

      item.checked = !item.checked;
      markDirty();
      render();

      // FLIP: animate from old positions to new
      requestAnimationFrame(() => {
        wrap.querySelectorAll('.item-wrap[id]').forEach(el => {
          if (before[el.id] === undefined) return;
          const after = el.getBoundingClientRect().top;
          const delta = before[el.id] - after;
          if (Math.abs(delta) < 2) return;
          el.style.transition = 'none';
          el.style.transform = `translateY(${delta}px)`;
          requestAnimationFrame(() => {
            el.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)';
            el.style.transform = 'translateY(0)';
          });
        });
      });
    }, 200);
  }

  function clearToBuy() {
    const count = items.filter(i => i.checked).length;
    if (count === 0) return;
    const noun = count === 1 ? 'artikl' : count < 5 ? 'artikla' : 'artikala';
    const verb = count === 1 ? 'izbrisan' : count < 5 ? 'izbrisana' : 'izbrisano';
    document.getElementById('clearConfirmMsg').textContent =
      `${count} ${noun} će biti ${verb} iz liste 'Za kupiti'.`;
    document.getElementById('clearConfirmOverlay').classList.add('open');
  }
  function closeClearConfirm() {
    document.getElementById('clearConfirmOverlay').classList.remove('open');
  }
  function confirmClearToBuy() {
    items.forEach(i => { if (i.checked) i.checked = false; });
    markDirty(); render();
    closeClearConfirm();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const _combiningRe = new RegExp('[\\u0300-\\u036f]', 'g');
  function normalizeStr(s) {
    return s.normalize('NFD').replace(_combiningRe, '').toLowerCase();
  }

  function highlightMatch(name, q) {
    const normName = normalizeStr(name);
    const normQ    = normalizeStr(q);
    const idx = normName.indexOf(normQ);
    if (idx === -1) return escHtml(name);
    return escHtml(name.slice(0, idx))
      + '<mark>' + escHtml(name.slice(idx, idx + normQ.length)) + '</mark>'
      + escHtml(name.slice(idx + normQ.length));
  }

  // ── Enter key + live filter ───────────────────────────────
  const newItemInput = document.getElementById('newItem');
  newItemInput.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  newItemInput.addEventListener('input', e => { filter = e.target.value; render(); });

  // ── Pull to refresh ───────────────────────────────────────
  let startY = 0;
  document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 80 && window.scrollY === 0) fetchList();
  }, { passive: true });

  // ── Config ────────────────────────────────────────────────
  let pendingSortType      = null;
  let pendingNotifyApp     = null;
  let pendingCategories    = null;
  let originalCategoryIds  = null;
  let catDragInitialized   = false;
  let justDragged          = false;

  const sortLabels = {
    category: 'Kategorija → Za kupiti → Abeceda',
    tobuy:    'Za kupiti → Kategorija → Abeceda'
  };
  let pendingFontSize = null;
  function setFontSize(size) {
    pendingFontSize = size;
    document.getElementById('fontSizeCycleLabel').textContent = fontSizes[size].label;
    applyFontSize(size);
  }
  function cycleFontSize() {
    const current = pendingFontSize || fontSize;
    const next = fontSizeOrder[(fontSizeOrder.indexOf(current) + 1) % fontSizeOrder.length];
    setFontSize(next);
  }

  function initCatDrag() {
    const editor = document.getElementById('catIconEditor');
    let dragSrc = null, ghost = null;
    let offsetX = 0, offsetY = 0, tileW = 0, tileH = 0;
    let startX = 0, startY = 0;
    let longPressTimer = null;
    let pendingMouseTile = null;

    function allCells() {
      return Array.from(editor.querySelectorAll('.cat-icon-edit-cell'));
    }

    function startDrag(tile, cx, cy) {
      dragSrc = tile;
      const r = tile.getBoundingClientRect();
      offsetX = cx - r.left; offsetY = cy - r.top;
      tileW = r.width; tileH = r.height;
      ghost = tile.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: tileW + 'px', height: tileH + 'px',
        left: r.left + 'px', top: r.top + 'px',
        zIndex: '1000', pointerEvents: 'none',
        transform: 'scale(1.08)', borderRadius: '12px',
        boxShadow: '0 8px 24px rgba(0,0,0,0.2)', opacity: '0.95',
      });
      document.body.appendChild(ghost);
      tile.style.opacity = '0.15';
      tile.style.pointerEvents = 'none';
    }

    function updateDrag(cx, cy) {
      if (!ghost) return;
      ghost.style.left = (cx - offsetX) + 'px';
      ghost.style.top  = (cy - offsetY) + 'px';
      const gcx = cx - offsetX + tileW / 2;
      const gcy = cy - offsetY + tileH / 2;
      let nearest = null, nearestDist = Infinity;
      allCells().filter(c => c !== dragSrc).forEach(c => {
        const r = c.getBoundingClientRect();
        const d = Math.hypot(gcx - (r.left + r.width / 2), gcy - (r.top + r.height / 2));
        if (d < nearestDist) { nearestDist = d; nearest = c; }
      });
      if (nearest) {
        const r = nearest.getBoundingClientRect();
        if (gcy < r.top + r.height / 2) editor.insertBefore(dragSrc, nearest);
        else nearest.after(dragSrc);
      }
    }

    function endDrag() {
      if (!dragSrc) return;
      ghost?.remove(); ghost = null;
      dragSrc.style.opacity = '';
      dragSrc.style.pointerEvents = '';
      dragSrc = null;
      justDragged = true;
      setTimeout(() => { justDragged = false; }, 300);
      if (!pendingCategories) return;
      const ids = allCells().map(c => c.dataset.catId);
      pendingCategories.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
    }

    editor.addEventListener('touchstart', e => {
      const tile = e.target.closest('.cat-icon-edit-cell');
      if (!tile || e.target.closest('.cat-icon-delete-btn')) return;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        startDrag(tile, t.clientX, t.clientY);
      }, 500);
    }, { passive: true });

    editor.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (longPressTimer) {
        if (Math.hypot(t.clientX - startX, t.clientY - startY) > 8) {
          clearTimeout(longPressTimer); longPressTimer = null;
        }
        return;
      }
      if (!dragSrc) return;
      e.preventDefault();
      updateDrag(t.clientX, t.clientY);
    }, { passive: false });

    editor.addEventListener('touchend', () => {
      clearTimeout(longPressTimer); longPressTimer = null;
      endDrag();
    }, { passive: true });

    editor.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer); longPressTimer = null;
      if (dragSrc) {
        ghost?.remove(); ghost = null;
        dragSrc.style.opacity = ''; dragSrc.style.pointerEvents = '';
        dragSrc = null;
      }
    }, { passive: true });

    editor.addEventListener('mousedown', e => {
      const tile = e.target.closest('.cat-icon-edit-cell');
      if (!tile || e.target.closest('.cat-icon-delete-btn') || e.target.closest('.cat-icon-inp')) return;
      startX = e.clientX; startY = e.clientY;
      pendingMouseTile = tile;

      function onMouseMove(e) {
        if (pendingMouseTile && !dragSrc && Math.hypot(e.clientX - startX, e.clientY - startY) > 5) {
          startDrag(pendingMouseTile, e.clientX, e.clientY);
          pendingMouseTile = null;
        }
        if (dragSrc) updateDrag(e.clientX, e.clientY);
      }

      function onMouseUp() {
        pendingMouseTile = null;
        endDrag();
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      }

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    });
  }

  function populateCatIconEditor() {
    const editor = document.getElementById('catIconEditor');
    editor.innerHTML = '';
    pendingCategories.forEach(cat => {
      const cell = document.createElement('div');
      cell.className = 'cat-option cat-icon-edit-cell';
      cell.dataset.catId = cat.id;
      cell.style.position = 'relative';

      const display = document.createElement('span');
      display.className = 'cat-icon-display';
      display.textContent = cat.icon;

      const inp = document.createElement('input');
      inp.className = 'cat-icon-inp';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      inp.placeholder = '☺';

      const lbl = document.createElement('span');
      lbl.className = 'cat-option-label';
      lbl.textContent = cat.label;

      cell.appendChild(display);
      cell.appendChild(inp);
      cell.appendChild(lbl);

      if (cat.id !== 'other') {
        const del = document.createElement('button');
        del.className = 'cat-icon-delete-btn';
        del.textContent = '✕';
        del.title = 'Obriši kategoriju';
        del.onclick = e => {
          e.stopPropagation();
          pendingCategories = pendingCategories.filter(c => c.id !== cat.id);
          populateCatIconEditor();
        };
        cell.appendChild(del);
      }

      function confirmEdit() {
        const val = inp.value.trim();
        if (val) display.textContent = lastGrapheme(val);
        cell.classList.remove('editing');
      }

      inp.addEventListener('input', () => { if (inp.value.trim()) inp.value = lastGrapheme(inp.value); });
      inp.addEventListener('blur', confirmEdit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } });

      display.addEventListener('click', e => {
        if (justDragged) return;
        e.stopPropagation();
        inp.value = '';
        cell.classList.add('editing');
        inp.focus();
      });

      editor.appendChild(cell);
    });

    // "+" add tile
    const addTile = document.createElement('div');
    addTile.className = 'cat-icon-add-tile';
    addTile.innerHTML = '<span>+</span><span style="font-size:0.7rem">Nova</span>';
    addTile.onclick = openCatIconAddForm;
    editor.appendChild(addTile);
    if (!catDragInitialized) { catDragInitialized = true; initCatDrag(); }
  }

  function openCatIconAddForm() {
    const row = document.getElementById('catIconAddRow');
    row.innerHTML = '';
    row.style.display = 'flex';

    // Emoji cell
    const emojiCell = document.createElement('div');
    emojiCell.className = 'cat-option cat-icon-edit-cell editing';
    emojiCell.style.cssText = 'flex-shrink:0;width:56px;min-width:56px;position:relative';
    const emojiInp = document.createElement('input');
    emojiInp.className = 'cat-icon-inp';
    emojiInp.style.display = 'block';
    emojiInp.placeholder = '☺';
    emojiInp.autocomplete = 'off';
    emojiInp.spellcheck = false;
    emojiCell.appendChild(emojiInp);
    row.appendChild(emojiCell);

    emojiInp.addEventListener('input', () => { if (emojiInp.value.trim()) emojiInp.value = lastGrapheme(emojiInp.value); });

    // Name input
    const nameInp = document.createElement('input');
    nameInp.type = 'text';
    nameInp.placeholder = 'Naziv kategorije…';
    nameInp.style.cssText = 'flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:1rem;color:var(--ink)';
    nameInp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); confirmAddCategory(); } });
    row.appendChild(nameInp);

    // Confirm
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'cat-icon-add-confirm';
    confirmBtn.textContent = '✓';
    confirmBtn.onclick = confirmAddCategory;
    row.appendChild(confirmBtn);

    // Cancel
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'cat-icon-add-cancel';
    cancelBtn.textContent = '✕';
    cancelBtn.onclick = cancelAddCategory;
    row.appendChild(cancelBtn);

    emojiInp.focus();

    function confirmAddCategory() {
      const emoji = emojiInp.value.trim();
      const name  = nameInp.value.trim();
      if (!emoji || emoji === '☺') { showToast('Odaberi emoji za kategoriju'); emojiInp.focus(); return; }
      if (!name) { showToast('Unesi naziv kategorije'); nameInp.focus(); return; }
      const slug = name.normalize('NFD').replace(/[̀-ͯ]/g, '')
        .toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
      let id = slug || 'cat';
      let n = 2;
      while (pendingCategories.some(c => c.id === id)) id = slug + '_' + n++;
      pendingCategories.push({ id, icon: emoji, _baseIcon: emoji, label: name });
      cancelAddCategory();
      populateCatIconEditor();
    }

    function cancelAddCategory() {
      row.style.display = 'none';
      row.innerHTML = '';
    }
  }

  function openConfig() {
    document.getElementById('cfgToken').value = cfg.token;
    document.getElementById('cfgNotifyPhone').value = cfg.notifyPhone;
    setNotifyApp(cfg.notifyApp || 'whatsapp');
    pendingSortType = sortType;
    setFontSize(fontSize);
    originalCategoryIds = categories.map(c => c.id).join(',');

    setSortType(sortType);
    populateCatIconEditor();
    document.getElementById('configOverlay').classList.add('open');

  function closeConfig() {
    pendingSortType = null;
    pendingNotifyApp = null;
    pendingFontSize = null;
    pendingCategories = null;
    originalCategoryIds = null;
    applyFontSize(fontSize); // revert live preview if cancelled
    document.getElementById('catIconAddRow').style.display = 'none';
    document.getElementById('catIconAddRow').innerHTML = '';
    document.getElementById('configOverlay').classList.remove('open');

  function saveConfig() {
    cfg.token = document.getElementById('cfgToken').value.trim();
    localStorage.setItem('gh_token', cfg.token);
    cfg.notifyPhone = document.getElementById('cfgNotifyPhone').value.trim();
    localStorage.setItem('notify_phone', cfg.notifyPhone);
    cfg.notifyApp = pendingNotifyApp ?? cfg.notifyApp ?? 'whatsapp';
    localStorage.setItem('notify_app', cfg.notifyApp);
    if (pendingSortType !== null && pendingSortType !== sortType) {
      sortType = pendingSortType;
      localStorage.setItem('sort_type', sortType);
    }
    if (pendingFontSize !== null && pendingFontSize !== fontSize) {
      fontSize = pendingFontSize;
      localStorage.setItem('font_size', fontSize);
    }
    pendingSortType = null;
    pendingFontSize = null;
    pendingNotifyApp = null;

    // Read icon edits from cells into localCatIcons; prune deleted categories
    document.querySelectorAll('.cat-icon-edit-cell[data-cat-id]').forEach(cell => {
      const id  = cell.dataset.catId;
      const val = cell.querySelector('.cat-icon-display').textContent.trim();
      const cat = pendingCategories.find(c => c.id === id);
      if (cat && val && val !== cat._baseIcon) localCatIcons[id] = val;
      else delete localCatIcons[id];
    });
    const activeIds = new Set(pendingCategories.map(c => c.id));
    Object.keys(localCatIcons).forEach(id => { if (!activeIds.has(id)) delete localCatIcons[id]; });
    localStorage.setItem('cat_icons', JSON.stringify(localCatIcons));

    const categoriesChanged = pendingCategories.map(c => c.id).join(',') !== originalCategoryIds;
    categories = pendingCategories;
    ensureFallbackCategory(categories);
    localCatOrder = categories.map(c => c.id);
    localStorage.setItem('cat_order', JSON.stringify(localCatOrder));
    pendingCategories = null;
    originalCategoryIds = null;

    applyCatIcons();
    closeConfig();
    render();

    if (categoriesChanged) {
      markDirty();
      pushList();
    } else {
      fetchList();
    }
  }

  // ── Quantity picker (inline) ──────────────────────────────
  let qtyPickerItemId = null;
  let qtyMode = 'stepper';
  let qtyCurrent = 1;

  function openQtyPicker(id, forceMode = null) {
    closeQtyPicker();
    qtyPickerItemId = id;
    const item = items.find(i => i.id === id);
    if (!item) return;

    const qty = item.qty;
    const isNum = typeof qty === 'number' && qty >= 0;
    qtyCurrent = isNum ? qty : 1;
    qtyMode = forceMode || ((qty != null && qty !== '' && typeof qty !== 'number') ? 'text' : 'stepper');

    const inline = document.createElement('div');
    inline.className = 'qty-inline';
    inline.id = 'qty-inline-' + id;

    const stepperRow = document.createElement('div');
    stepperRow.className = 'qty-stepper-row' + (qtyMode === 'text' ? ' hidden' : '');
    stepperRow.innerHTML = `
      <button class="qty-step-btn" onclick="qtyAdjust(-1)">−</button>
      <button class="qty-num-btn" id="qtyNumBtn" onclick="qtySwitchToText()">${qtyCurrent}</button>
      <button class="qty-step-btn" onclick="qtyAdjust(1)">+</button>
      <button class="qty-back-btn" onclick="qtySwitchToText()">← 400ml</button>`;

    const textRow = document.createElement('div');
    textRow.className = 'qty-text-row' + (qtyMode === 'text' ? ' visible' : '');
    textRow.innerHTML = `
      <input type="text" class="qty-text-input" id="qtyTextInput"
        value="${escHtml(qtyMode === 'text' ? String(qty) : '')}"
        placeholder="npr. 500g, 1.5kg…" autocorrect="off" />
      <button class="qty-back-btn" onclick="qtySwitchToStepper()">← broj</button>`;

    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:6px;flex-shrink:0';
    actions.innerHTML = `
      <button class="qty-confirm-btn" onclick="qtySave()">✓</button>
      <button class="qty-dismiss-btn" onclick="closeQtyPicker()">✕</button>`;

    inline.appendChild(stepperRow);
    inline.appendChild(textRow);
    inline.appendChild(actions);

    const wrap = document.getElementById('wrap-' + id);
    if (wrap) wrap.after(inline);

    if (qtyMode === 'text') setTimeout(() => document.getElementById('qtyTextInput')?.focus(), 80);
  }

  function qtyAdjust(delta) {
    qtyCurrent = Math.max(0, qtyCurrent + delta);
    document.getElementById('qtyNumBtn').textContent = qtyCurrent;
  }

  function qtySwitchToText() {
    qtyMode = 'text';
    const textRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-text-row');
    const stepperRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-stepper-row');
    document.getElementById('qtyTextInput').value = String(qtyCurrent);
    stepperRow.classList.add('hidden');
    textRow.classList.add('visible');
    setTimeout(() => document.getElementById('qtyTextInput')?.focus(), 80);
  }

  function qtySwitchToStepper() {
    const val = document.getElementById('qtyTextInput').value.trim();
    // If value contains non-digit characters (free text), don't switch — just refocus
    if (val !== '' && !/^\d+$/.test(val)) {
      document.getElementById('qtyTextInput')?.focus();
      return;
    }
    qtyMode = 'stepper';
    const n = parseInt(val, 10);
    qtyCurrent = (!isNaN(n) && n > 0) ? n : 1;
    document.getElementById('qtyNumBtn').textContent = qtyCurrent;
    const textRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-text-row');
    const stepperRow = document.querySelector('#qty-inline-' + qtyPickerItemId + ' .qty-stepper-row');
    textRow.classList.remove('visible');
    stepperRow.classList.remove('hidden');
  }

  function qtySave() {
    const item = items.find(i => i.id === qtyPickerItemId);
    if (!item) return;
    if (qtyMode === 'stepper') {
      if (qtyCurrent === 0) {
        delete item.qty;
        item.checked = false;
      } else {
        item.qty = qtyCurrent;
        item.checked = true;
      }
    } else {
      const val = document.getElementById('qtyTextInput').value.trim();
      if (!val) {
        delete item.qty;
      } else {
        const n = parseInt(val, 10);
        const isZero = val === '0' || val === '00';
        if (isZero) {
          delete item.qty;
          item.checked = false;
        } else {
          item.qty = (String(n) === val && n > 0) ? n : val;
          item.checked = true;
        }
      }
    }
    closeQtyPicker();
    markDirty(); render();
  }

  function closeQtyPicker() {
    if (qtyPickerItemId) {
      document.getElementById('qty-inline-' + qtyPickerItemId)?.remove();
      qtyPickerItemId = null;
    }
  }

  // ── Inline item name edit ─────────────────────────────────
  function editItemName(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const span = document.querySelector('#wrap-' + id + ' .item-name');
    if (!span || span.contentEditable === 'true') return;
    span.textContent = item.name;
    span.contentEditable = 'true';
    span.focus();
    const range = document.createRange();
    range.selectNodeContents(span);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    function save() {
      const newName = span.textContent.trim();
      span.contentEditable = 'false';
      if (newName && newName !== item.name) { item.name = newName; markDirty(); render(); }
      else span.textContent = item.name;
    }
    span.addEventListener('blur', save, { once: true });
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); span.blur(); }
      if (e.key === 'Escape') { span.textContent = item.name; span.blur(); }
    });
  }

  // ── Photo ─────────────────────────────────────────────────
  let photoItemId = null;

  function pickPhoto(id) {
    photoItemId = id;
    document.getElementById('photoInput').value = '';
    document.getElementById('photoInput').click();
  }

  document.getElementById('photoInput').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file || !photoItemId) return;
    const base64 = await compressImage(file);
    const item = items.find(i => i.id === photoItemId);
    if (item) { item.photo = base64; markDirty(); render(); }
  });

  function photoSrc(p) {
    return p.startsWith('data:') ? p : 'data:image/jpeg;base64,' + p;
  }

  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 400;
          let w = img.width, h = img.height;
          if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
          else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function openPhoto(id) {
    photoItemId = id;
    const item = items.find(i => i.id === id);
    if (!item?.photo) return;
    document.getElementById('photoOverlayImg').src = photoSrc(item.photo);
    document.getElementById('photoOverlay').classList.add('open');

    closePhoto();

  // ── Share ─────────────────────────────────────────────────
  function shareList() {
    const toBuy = items.filter(i => i.checked);
    if (toBuy.length === 0) { showToast('Nema artikala za kupnju'); return; }
    if (!cfg.notifyPhone || !cfg.notifyApp) { openConfig(); return; }

    const text = '🛒 Namirnice za kupiti:\n' + toBuy.map(i => {
      if (i.qty == null || i.qty === '') return '• ' + i.name;
      const qtyStr = typeof i.qty === 'number' ? '× ' + i.qty : i.qty;
      return '• ' + i.name + ' (' + qtyStr + ')';
    }).join('\n');

    const phone = cfg.notifyPhone.replace(/\D/g, '');
    const enc   = encodeURIComponent(text);
    let url;
    if (cfg.notifyApp === 'sms') url = `sms:+${phone}&body=${enc}`;
    else                         url = `https://wa.me/${phone}?text=${enc}`;
    window.location.href = url;
  }

  // ── Init ──────────────────────────────────────────────────
  loadLocal();
  updateFilterBtn();
  if (items.length > 0) render();
  if (cfg.user && cfg.token) fetchList();
  else openConfig();

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') fetchList();
  });
</script>
</body>
</html>
